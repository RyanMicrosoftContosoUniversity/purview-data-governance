# =============================================================================
# GitHub Actions CI/CD
# Purview Classification Function (fabric-delta-table-sensitivity-purview-int)
#
# Pipeline stages:
#   1. Validate        — ruff format check + pytest
#   2. Drift-detect    — terraform plan, fail if IaC drifts from Azure (PR only)
#   3. Package         — install prod deps to .python_packages, zip the function
#   4. Deploy          — zip-deploy to Flex Consumption Function App (main only)
#   5. Verify          — confirm classify_assets is indexed
#   6. Listener-health — confirm EH listener is alive (lease blob heartbeat)
#
# Authenticates to Azure with OIDC (workload identity federation). No secrets.
# Required environment-scoped variables (Settings → Environments → <env>):
#   AZURE_CLIENT_ID         (federated app reg)
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#   RESOURCE_GROUP_NAME
#   FUNCTION_APP_NAME
#
# Required RBAC for the federated app reg (subscription scope unless noted):
#   Reader                                — read all resources for tf plan
#   Storage Blob Data Contributor         — on terraform state container
#                                           (terraformsaeheus2/tf-state-container)
#   Storage Blob Data Reader              — on function host storage
#                                           (stfabricsensrh) for lease blob check
#   Website Contributor (or higher)       — on the function app for zip deploy
# =============================================================================

name: classify-assets-function

on:
  push:
    branches: [main]
    paths:
      - 'fabric-delta-table-sensitivity-purview-int/iac/function/**'
      - 'fabric-delta-table-sensitivity-purview-int/iac/*.tf'
      - '.github/workflows/classify-assets-function.yml'
  pull_request:
    branches: [main]
    paths:
      - 'fabric-delta-table-sensitivity-purview-int/iac/function/**'
      - 'fabric-delta-table-sensitivity-purview-int/iac/*.tf'
      - '.github/workflows/classify-assets-function.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        default: dev
        options: [dev]
      runTests:
        description: 'Run unit tests'
        type: boolean
        default: true
      runLint:
        description: 'Run ruff lint'
        type: boolean
        default: true
      deployFunction:
        description: 'Deploy function (main only)'
        type: boolean
        default: true

permissions:
  id-token: write   # required for OIDC federation to Azure
  contents: read

env:
  PYTHON_VERSION: '3.11'
  FUNCTION_ROOT: fabric-delta-table-sensitivity-purview-int/iac/function

jobs:
  # ===========================================================================
  # STAGE 1: Validate (lint + unit tests)
  # ===========================================================================
  validate:
    name: Validate (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FUNCTION_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.FUNCTION_ROOT }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ruff

      - name: Ruff format check
        if: ${{ github.event.inputs.runLint != 'false' }}
        run: ruff format --config "format.quote-style='single'" --check classify_assets/ function_app.py

      - name: Run pytest
        if: ${{ github.event.inputs.runTests != 'false' }}
        run: python -m pytest tests/ -x --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: ${{ always() && github.event.inputs.runTests != 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ env.FUNCTION_ROOT }}/test-results.xml

  # ===========================================================================
  # STAGE 2: Terraform drift detection
  # Runs `terraform plan` and fails if live Azure state has drifted from IaC.
  # This catches manual portal/CLI changes (like the AzureWebJobsStorage=""
  # fiasco that wasn't reflected in TF until after the fact).
  # ===========================================================================
  drift-detect:
    name: Terraform drift check
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: fabric-delta-table-sensitivity-purview-int/iac
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        env:
          # azurerm provider: must use OIDC (rejects CLI auth for SPs).
          ARM_USE_OIDC: 'true'
          ARM_USE_AZUREAD: 'true'
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          # microsoft/fabric provider: hardcoded use_cli=true in providers.tf.
          # It also reads ARM_USE_OIDC, which would conflict. Override with
          # FABRIC_* env vars so it ignores the azurerm OIDC settings.
          FABRIC_USE_OIDC: 'false'
          FABRIC_USE_MSI: 'false'
          FABRIC_USE_CLI: 'true'
        run: |
          export ARM_CLIENT_ID="$(echo -n "$ARM_CLIENT_ID" | tr -d '[:space:]')"
          export ARM_TENANT_ID="$(echo -n "$ARM_TENANT_ID" | tr -d '[:space:]')"
          export ARM_SUBSCRIPTION_ID="$(echo -n "$ARM_SUBSCRIPTION_ID" | tr -d '[:space:]')"
          terraform init -input=false

      - name: Terraform plan (detailed exit code)
        id: plan
        env:
          ARM_USE_OIDC: 'true'
          ARM_USE_AZUREAD: 'true'
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          FABRIC_USE_OIDC: 'false'
          FABRIC_USE_MSI: 'false'
          FABRIC_USE_CLI: 'true'
        run: |
          export ARM_CLIENT_ID="$(echo -n "$ARM_CLIENT_ID" | tr -d '[:space:]')"
          export ARM_TENANT_ID="$(echo -n "$ARM_TENANT_ID" | tr -d '[:space:]')"
          export ARM_SUBSCRIPTION_ID="$(echo -n "$ARM_SUBSCRIPTION_ID" | tr -d '[:space:]')"
          # Use -refresh=false to skip reading live Azure state. This avoids
          # triggering the fabric provider (whose SP doesn't have Fabric
          # workspace auth). We still catch the most important class of
          # drift: divergence between TF code and last-applied state — i.e.,
          # someone changed TF without running apply, or someone applied
          # without committing. Out-of-band Azure portal changes are NOT
          # caught here; the dedicated "Function app config check" step
          # below uses `az` to verify the live function-app config directly,
          # which targets the specific bug class that motivated this job.
          set +e
          terraform plan -input=false -lock=false -refresh=false -detailed-exitcode -out=tfplan \
            -target=azurerm_storage_account.func \
            -target=azurerm_storage_container.deployments \
            -target=azurerm_log_analytics_workspace.func \
            -target=azurerm_application_insights.func \
            -target=azurerm_service_plan.func \
            -target=azurerm_role_assignment.func_storage \
            -target=azurerm_role_assignment.func_storage_queue \
            -target=azurerm_role_assignment.func_storage_table \
            -target=azurerm_role_assignment.func_eh_receiver \
            -target=azurerm_eventhub_namespace.purview_events \
            -target=azurerm_eventhub.scan_status \
            -target=azurerm_eventhub_namespace_authorization_rule.diag_send \
            -target=azurerm_monitor_diagnostic_setting.purview_to_eh
          rc=$?
          set -e
          # detailed-exitcode: 0 = no changes, 1 = error, 2 = drift detected
          case $rc in
            0)
              echo "::notice::No drift on function-app resources."
              ;;
            1)
              echo "::error::terraform plan failed."
              exit 1
              ;;
            2)
              echo "::error::Drift detected on function-app resources — live Azure differs from IaC. Review the plan output and either update Terraform to match reality or apply Terraform to reset the live state."
              terraform show -no-color tfplan
              exit 1
              ;;
          esac

      - name: Function app config check (AzureWebJobsStorage sanity)
        # This guards against the specific bug class where AzureWebJobsStorage
        # is set to empty string on a Flex Consumption function with
        # identity-based storage, which silently breaks the EH listener.
        # We check the live Azure config directly (not TF state) because the
        # function_app_flex_consumption resource can't be included in the TF
        # drift plan (its app_settings reference fabric_lakehouse).
        env:
          FUNCTION_APP_NAME: func-fabricsens-rh
          FUNCTION_APP_RG: governance-rg
        run: |
          set -euo pipefail
          echo "Reading app settings for $FUNCTION_APP_NAME ..."
          settings_json=$(az functionapp config appsettings list \
            -g "$FUNCTION_APP_RG" -n "$FUNCTION_APP_NAME" -o json)

          # Required: AzureWebJobsStorage__accountName must be set.
          acct_name=$(echo "$settings_json" | jq -r '.[] | select(.name=="AzureWebJobsStorage__accountName") | .value')
          if [ -z "$acct_name" ] || [ "$acct_name" = "null" ]; then
            echo "::error::AzureWebJobsStorage__accountName is not set on $FUNCTION_APP_NAME. Identity-based storage will not work and the EH listener will fail."
            exit 1
          fi
          echo "✓ AzureWebJobsStorage__accountName = $acct_name"

          # Forbidden: AzureWebJobsStorage must NOT exist with empty value.
          # An empty AzureWebJobsStorage suppresses the __accountName path on
          # Flex Consumption and silently breaks EH listener lease acquisition.
          awjs_present=$(echo "$settings_json" | jq -r '[.[] | select(.name=="AzureWebJobsStorage")] | length')
          if [ "$awjs_present" -gt 0 ]; then
            awjs_value=$(echo "$settings_json" | jq -r '.[] | select(.name=="AzureWebJobsStorage") | .value')
            if [ -z "$awjs_value" ] || [ "$awjs_value" = "null" ]; then
              echo "::error::AzureWebJobsStorage is set to an empty value on $FUNCTION_APP_NAME. On Flex Consumption with identity-based storage this silently breaks the EH listener. Remove the empty AzureWebJobsStorage setting."
              exit 1
            fi
            echo "⚠ AzureWebJobsStorage is set to a non-empty connection string. That bypasses managed-identity storage but will not break the listener."
          else
            echo "✓ AzureWebJobsStorage is not set (correct for identity-based storage)."
          fi

          # Required: PurviewEvents__credential = "managedidentity".
          # Without this, the EH SDK / platform scale controller can't tell to
          # auth via managed identity even when __fullyQualifiedNamespace is set.
          # The scaler then never wakes a worker → silent dead listener.
          eh_cred=$(echo "$settings_json" | jq -r '.[] | select(.name=="PurviewEvents__credential") | .value')
          if [ "$eh_cred" != "managedidentity" ]; then
            echo "::error::PurviewEvents__credential is '$eh_cred' (expected 'managedidentity'). Without this, the Flex Consumption scale controller cannot authenticate to Event Hubs and the listener will silently die."
            exit 1
          fi
          echo "✓ PurviewEvents__credential = managedidentity"

          eh_fqns=$(echo "$settings_json" | jq -r '.[] | select(.name=="PurviewEvents__fullyQualifiedNamespace") | .value')
          if [ -z "$eh_fqns" ] || [ "$eh_fqns" = "null" ]; then
            echo "::error::PurviewEvents__fullyQualifiedNamespace is not set."
            exit 1
          fi
          echo "✓ PurviewEvents__fullyQualifiedNamespace = $eh_fqns"

      # ---------------------------------------------------------------------
      # Detect MI-rotation drift: the function's MI principalId must match
      # the principal_id that holds 'Azure Event Hubs Data Receiver' on the
      # EH namespace AND 'Storage Blob Data Owner' on the function's storage.
      # If the function app gets recreated, its MI rotates but TF state may
      # still hold the old principal_id, leaving the live MI without RBAC.
      # That's a silent dead-listener bug: deploy succeeds but no events flow.
      # ---------------------------------------------------------------------
      - name: Function MI role-binding check
        env:
          FUNCTION_APP_NAME: func-fabricsens-rh
          FUNCTION_APP_RG: governance-rg
          EH_NAMESPACE: ehns-fabricsens-rh
          STORAGE_ACCT: stfabricsensrh
        run: |
          set -euo pipefail
          live_mi=$(az functionapp identity show -g "$FUNCTION_APP_RG" -n "$FUNCTION_APP_NAME" --query principalId -o tsv)
          if [ -z "$live_mi" ]; then
            echo "::error::Function app $FUNCTION_APP_NAME has no system-assigned identity."
            exit 1
          fi
          echo "Live function MI principalId: $live_mi"

          sub=$(az account show --query id -o tsv)
          ehns_id="/subscriptions/$sub/resourceGroups/$FUNCTION_APP_RG/providers/Microsoft.EventHub/namespaces/$EH_NAMESPACE"
          sa_id="/subscriptions/$sub/resourceGroups/$FUNCTION_APP_RG/providers/Microsoft.Storage/storageAccounts/$STORAGE_ACCT"

          check_role() {
            local role="$1" scope="$2"
            local count
            count=$(az role assignment list --assignee "$live_mi" --role "$role" --scope "$scope" --query "length(@)" -o tsv 2>/dev/null || echo 0)
            if [ "$count" -eq 0 ]; then
              echo "::error::Live function MI ($live_mi) is MISSING '$role' on $scope. This is the MI-rotation drift bug — TF state likely holds an old principalId. The EH listener will be dead."
              return 1
            fi
            echo "✓ MI has '$role' on ${scope##*/}"
          }
          check_role "Azure Event Hubs Data Receiver" "$ehns_id"
          check_role "Storage Blob Data Owner"        "$sa_id"
          check_role "Storage Queue Data Contributor" "$sa_id"
          check_role "Storage Table Data Contributor" "$sa_id"

  # ===========================================================================
  # STAGE 3: Package (build deployment zip)
  # ===========================================================================
  package:
    name: Package function
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FUNCTION_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.FUNCTION_ROOT }}/requirements.txt

      - name: Install production dependencies into .python_packages
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install \
            --target=".python_packages/lib/site-packages" \
            -r requirements.txt

      - name: Build deployment zip
        run: |
          set -euo pipefail
          # Match exclusions from iac/phase2_function.tf archive_file.
          rm -rf .ruff_cache .pytest_cache tests
          find . -type d -name __pycache__ -exec rm -rf {} +
          zip -r function.zip . \
            -x '*.pyc' \
            -x 'local.settings.json' \
            -x 'local.settings.json.example' \
            -x 'CICD.md' \
            -x 'azure-pipelines.yml'

      - name: Verify zip contents
        run: |
          set -euo pipefail
          unzip -l function.zip | head -40
          if ! unzip -l function.zip | grep -q ' function_app\.py$'; then
            echo "::error::function_app.py not found at zip root"
            exit 1
          fi

      - name: Upload function-package artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-package
          path: ${{ env.FUNCTION_ROOT }}/function.zip
          retention-days: 7

  # ===========================================================================
  # STAGE 4: Deploy (main branch only)
  # ===========================================================================
  deploy:
    name: Deploy to Azure
    needs: package
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event.inputs.deployFunction != 'false')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Download function-package artifact
        uses: actions/download-artifact@v4
        with:
          name: function-package
          path: ./artifact

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Zip-deploy to Flex Consumption app
        run: |
          set -euo pipefail
          ZIP_PATH="$GITHUB_WORKSPACE/artifact/function.zip"
          echo "Deploying $ZIP_PATH to ${{ vars.FUNCTION_APP_NAME }} in ${{ vars.RESOURCE_GROUP_NAME }}"
          # Flex Consumption requires --build-remote false (zip already contains deps).
          az functionapp deployment source config-zip \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --name "${{ vars.FUNCTION_APP_NAME }}" \
            --src "$ZIP_PATH" \
            --build-remote false

  # ===========================================================================
  # STAGE 5: Verify (post-deploy smoke check)
  # ===========================================================================
  verify:
    name: Verify deployment
    needs: deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Confirm classify_assets is indexed
        run: |
          set -euo pipefail
          # Give the host a moment to restart and re-index after the deploy.
          sleep 30
          FUNCS=$(az functionapp function list \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --name "${{ vars.FUNCTION_APP_NAME }}" \
            --query "[].name" -o tsv)
          echo "Functions discovered:"
          echo "$FUNCS"
          if ! echo "$FUNCS" | grep -q "classify_assets"; then
            echo "::error::classify_assets function not indexed on ${{ vars.FUNCTION_APP_NAME }}"
            exit 1
          fi
          echo "::notice::classify_assets is indexed and ready."

  # ===========================================================================
  # STAGE 6: Listener health (post-deploy) — synthetic event test
  # The previous lease-blob check was unreliable: on idle Flex Consumption EH
  # functions, no worker runs unless events flow, so no ownership lease ever
  # gets renewed even when the listener is fully healthy.
  #
  # The only reliable signal is end-to-end: send a synthetic event with a
  # unique correlation token, then poll App Insights for an invocation that
  # processed it within the timeout. If the function is dead (bad MI roles,
  # missing __credential, AzureWebJobsStorage='', etc.) the platform scaler
  # never wakes a worker and the synthetic event is never processed.
  #
  # Requires (one-time setup): the GH Actions OIDC SP needs
  #   - "Azure Event Hubs Data Sender" on the EH (purview-scan-status)
  #   - "Monitoring Reader" on the resource group (or AI component)
  # ===========================================================================
  listener-health:
    name: EH listener health check
    needs: verify
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      EH_NAMESPACE: ehns-fabricsens-rh
      EH_NAME: purview-scan-status
      APPI_NAME: appi-func-fabricsens-rh
      APPI_RG: governance-rg
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Synthetic event end-to-end test
        run: |
          set -euo pipefail
          pip install --quiet azure-eventhub azure-identity

          # Capture send time so we can scope the post-send invocation query.
          SEND_TS_EPOCH=$(date -u +%s)
          SEND_TS_ISO=$(date -u -d "@$SEND_TS_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
          PROBE="ci-probe-${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-1}-$SEND_TS_EPOCH"
          echo "Probe token : $PROBE"
          echo "Send time   : $SEND_TS_ISO"
          export PROBE

          python - <<'PY'
          import os, json
          from azure.eventhub import EventHubProducerClient, EventData
          from azure.identity import DefaultAzureCredential
          fqns  = f"{os.environ['EH_NAMESPACE']}.servicebus.windows.net"
          eh    = os.environ['EH_NAME']
          probe = os.environ['PROBE']
          payload = {
              "_ci_probe": probe,
              # Synthetic shape — function will accept the batch but skip
              # classification since it's not a real scan-status event.
              "topic": "ci-synthetic",
              "eventType": "ci.healthcheck",
              "data": {"probe": probe},
          }
          with EventHubProducerClient(
              fully_qualified_namespace=fqns,
              eventhub_name=eh,
              credential=DefaultAzureCredential(),
          ) as p:
              batch = p.create_batch()
              batch.add(EventData(json.dumps(payload)))
              p.send_batch(batch)
          print("send OK")
          PY

          # The function doesn't log raw event payloads, so we can't grep for
          # the probe token directly. Instead we look for ANY signal that
          # classify_assets executed at or after our send time. We union three
          # tables because App Insights adaptive sampling often drops the
          # `requests` row even when traces survive (we hit this exact false
          # negative in run 25555800315 — the function processed the probe in
          # 11s but no `requests` row was emitted, so the old check timed out).
          #
          # Signals (any one is sufficient):
          #   - requests.name == classify_assets (function host's request entry)
          #   - traces with "Executed 'Functions.classify_assets'" (host runtime)
          #   - traces with "classify_assets EH batch:" (our function code)
          #
          # 10 min ceiling: on Flex Consumption from cold-start, the platform
          # scaler can take 3-7 min to provision a worker for a non-HTTP
          # trigger after a period of zero traffic. App Insights ingestion
          # adds another ~30-90s. 600s gives healthy margin.
          APPI_ID=$(az monitor app-insights component show -g "$APPI_RG" --app "$APPI_NAME" --query appId -o tsv)
          MAX_WAIT=600
          STEP=20
          ELAPSED=0
          KQL="union
                 (requests | where timestamp >= datetime($SEND_TS_ISO) | where name == 'classify_assets' or operation_Name == 'classify_assets' | project timestamp, src='request'),
                 (traces   | where timestamp >= datetime($SEND_TS_ISO) | where message has \"Executed 'Functions.classify_assets'\" | project timestamp, src='executed'),
                 (traces   | where timestamp >= datetime($SEND_TS_ISO) | where message startswith 'classify_assets EH batch' | project timestamp, src='userlog')
               | count"
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            HITS=$(az monitor app-insights query \
              --app "$APPI_ID" \
              --analytics-query "$KQL" \
              --query "tables[0].rows[0][0]" -o tsv 2>/dev/null || echo 0)
            HITS=${HITS:-0}
            if [ "$HITS" -gt 0 ]; then
              echo "::notice::EH listener is alive — $HITS classify_assets signal(s) observed after probe send (latency: ${ELAPSED}s, probe: $PROBE)."
              exit 0
            fi
            echo "Waiting for invocation... (${ELAPSED}s elapsed, hits=$HITS)"
            sleep $STEP
            ELAPSED=$((ELAPSED + STEP))
          done

          echo "::error::EH listener appears DEAD — synthetic probe '$PROBE' was sent at $SEND_TS_ISO but no classify_assets invocation observed in App Insights within ${MAX_WAIT}s."
          echo "::error::Common causes: (1) AzureWebJobsStorage='' on Flex; (2) PurviewEvents__credential missing; (3) function MI lacks 'Azure Event Hubs Data Receiver' or 'Storage Blob Data Owner' (often after MI rotation)."
          echo "::error::Run 'az functionapp config appsettings list -g ${APPI_RG} -n func-fabricsens-rh' and 'az role assignment list --assignee \$(az functionapp identity show -g ${APPI_RG} -n func-fabricsens-rh --query principalId -o tsv)'."
          exit 1
